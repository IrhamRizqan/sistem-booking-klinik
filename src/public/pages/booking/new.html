<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .step-container {
            display: none;
        }
        .step-container.active {
            display: block;
        }
        .slot-btn {
            margin: 5px;
            width: 150px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="container section-padding">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center mb-4 fw-bold text-primary">Book an Appointment</h2>
                        
                        <div id="alert-container"></div>
                        
                        <div id="booking-success" style="display: none;" class="text-center">
                            <div class="mb-4">
                                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                            </div>
                            <h3 class="fw-bold mb-3">Booking Confirmed!</h3>
                            <div class="card bg-light border-0 mb-4 mx-auto" style="max-width: 400px;">
                                <div class="card-body text-start">
                                    <p class="mb-2"><strong>Booking Code:</strong> <span id="success-code" class="text-primary fw-bold fs-5"></span></p>
                                    <p class="mb-2"><strong>Queue Number:</strong> <span id="success-queue" class="badge bg-danger fs-5"></span></p>
                                    <hr>
                                    <p class="mb-1"><strong>Date:</strong> <span id="success-date"></span></p>
                                    <p class="mb-1"><strong>Time:</strong> <span id="success-time"></span></p>
                                    <p class="mb-0"><strong>Doctor:</strong> <span id="success-doctor"></span></p>
                                </div>
                            </div>
                            <a href="/patient/dashboard" class="btn btn-primary">Kembali ke Dashboard</a>
                        </div>

                        <form id="bookingForm">
                            <!-- Step 1: Visit Date -->
                            <div id="step-1" class="step-container active">
                                <h4 class="mb-3"><span class="badge bg-primary me-2">1</span>Select Visit Date</h4>
                                <div class="mb-3">
                                    <label for="visitDate" class="form-label text-muted fw-semibold">Visit Date</label>
                                    <input type="date" class="form-control form-control-lg" id="visitDate" required>
                                    <div class="form-text">You can book up to 30 days in advance.</div>
                                </div>
                                <button type="button" class="btn btn-primary btn-lg w-100 mt-3" id="btnNext1" disabled>Next</button>
                            </div>

                            <!-- Step 2: Specialization -->
                            <div id="step-2" class="step-container">
                                <h4 class="mb-3"><span class="badge bg-primary me-2">2</span>Select Specialization</h4>
                                <div class="mb-3">
                                    <label for="specialization" class="form-label text-muted fw-semibold">Specialization</label>
                                    <select class="form-select form-select-lg" id="specialization" required>
                                        <option value="" selected disabled>Loading...</option>
                                    </select>
                                </div>
                                <div class="d-flex justify-content-between mt-4">
                                    <button type="button" class="btn btn-outline-secondary btn-lg" onclick="goToStep(1)">Back</button>
                                    <button type="button" class="btn btn-primary btn-lg" id="btnNext2" disabled>Next</button>
                                </div>
                            </div>

                            <!-- Step 3: Doctor -->
                            <div id="step-3" class="step-container">
                                <h4 class="mb-3"><span class="badge bg-primary me-2">3</span>Select Doctor</h4>
                                <div class="mb-3">
                                    <label for="doctor" class="form-label text-muted fw-semibold">Doctor</label>
                                    <select class="form-select form-select-lg" id="doctor" required>
                                        <option value="" selected disabled>Choose Specialization first</option>
                                    </select>
                                </div>
                                <div class="d-flex justify-content-between mt-4">
                                    <button type="button" class="btn btn-outline-secondary btn-lg" onclick="goToStep(2)">Back</button>
                                    <button type="button" class="btn btn-primary btn-lg" id="btnNext3" disabled>Next</button>
                                </div>
                            </div>

                            <!-- Step 4: Summary -->
                            <div id="step-4" class="step-container">
                                <h4 class="mb-3"><span class="badge bg-primary me-2">4</span>Booking Summary</h4>
                                
                                <ul class="list-group mb-4">
                                    <li class="list-group-item d-flex justify-content-between align-items-center">
                                        <span class="text-muted">Date</span>
                                        <strong id="summaryDate"></strong>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center">
                                        <span class="text-muted">Specialization</span>
                                        <strong id="summarySpec"></strong>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between align-items-center">
                                        <span class="text-muted">Doctor & Time</span>
                                        <strong id="summaryDoctor"></strong>
                                    </li>
                                </ul>
                                
                                <input type="hidden" id="selectedScheduleId" required>
                                <input type="hidden" id="selectedTimeSlot" required>

                                <div class="d-flex justify-content-between mt-4">
                                    <button type="button" class="btn btn-outline-secondary btn-lg" onclick="goToStep(3)">Back</button>
                                    <button type="submit" class="btn btn-success btn-lg fw-bold" id="btnConfirm">Confirm Booking</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/booking/new.js"></script>
</body>
</html>
