<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="auth-page">
    <div class="auth-card card card--elevated">
      <h1 class="auth-card__title">Masuk</h1>
      <p class="auth-card__subtitle">Silakan masuk ke akun Anda</p>

      <div id="alert-container"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Nama Pengguna</label>
          <input class="form-input" type="text" id="username" placeholder="Masukkan username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Kata Sandi</label>
          <input class="form-input" type="password" id="password" placeholder="Masukkan kata sandi" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">Masuk</button>
      </form>

      <div class="auth-card__footer" style="display: flex; flex-direction: column; gap: var(--space-xs);">
        <div>Belum punya akun? <a href="/auth/register">Daftar di sini</a></div>
        <div style="margin-top: var(--space-xs); border-top: var(--rule-hair) solid var(--color-rule); padding-top: var(--space-sm);">
          Apakah Anda Admin? <a href="/auth/admin-login" style="color: var(--color-danger); font-weight: var(--weight-medium);">Masuk ke Portal Admin</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/auth/login.js"></script>
</body>
</html>
