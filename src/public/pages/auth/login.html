<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <div class="row justify-content-center section-padding">
            <div class="col-md-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold text-primary">Selamat Datang Kembali</h2>
                        <div id="alert-container"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted fw-semibold">Nama Pengguna (Username)</label>
                                <input type="text" class="form-control form-control-lg" id="username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted fw-semibold">Kata Sandi</label>
                                <input type="password" class="form-control form-control-lg" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Masuk</button>
                        </form>
                        <div class="text-center mt-4">
                            <span class="text-muted">Belum punya akun?</span>
                            <a href="/auth/register" class="text-decoration-none fw-semibold">Daftar di sini</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/auth/login.js"></script>
</body>

</html>
