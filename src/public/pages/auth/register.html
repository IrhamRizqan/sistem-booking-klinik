<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <main class="container-fluid p-0">
        <div class="row g-0" style="min-height: 100vh;">
            <!-- Left Side (Image/Branding) -->
            <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center bg-light-blue" style="position: relative; overflow: hidden;">
                <div style="z-index: 2; max-width: 80%; text-align: center;">
                    <img src="/images/hero.png" alt="Medical UI" class="img-fluid hero-image mb-4" style="max-height: 300px;">
                    <h2 class="fw-bold text-dark-blue mb-3">Bergabung dengan Kami</h2>
                    <p class="text-muted lead">Dapatkan kemudahan akses ke layanan kesehatan terbaik dengan teknologi modern.</p>
                </div>
            </div>

            <!-- Right Side (Form) -->
            <div class="col-lg-6 d-flex justify-content-center align-items-center">
                <div class="w-100" style="max-width: 500px; padding: 2rem;">
                    <div class="text-center mb-4">
                        <a href="/" class="text-decoration-none">
                            <h3 class="fw-bold text-primary mb-3"><i class="bi bi-hospital"></i> Sistem Booking Klinik</h3>
                        </a>
                        <h2 class="fw-bold text-dark-blue">Daftar Akun Baru</h2>
                        <p class="text-muted">Isi data diri Anda di bawah ini</p>
                    </div>

                    <div id="alert-container"></div>
                    
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label text-dark-blue fw-bold">Nama Lengkap</label>
                            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label text-dark-blue fw-bold">Nomor Telepon (Opsional)</label>
                            <input type="text" class="form-control" id="phone" placeholder="08123456789">
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label text-dark-blue fw-bold">Nama Pengguna (Username)</label>
                            <input type="text" class="form-control" id="username" placeholder="johndoe123" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label text-dark-blue fw-bold">Kata Sandi</label>
                                <input type="password" class="form-control" id="password" placeholder="Minimal 6 karakter" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="confirmPassword" class="form-label text-dark-blue fw-bold">Konfirmasi Kata Sandi</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Ulangi kata sandi" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Daftar Sekarang</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted">Sudah punya akun?</span>
                        <a href="/auth/login" class="text-primary text-decoration-none fw-bold ms-1">Masuk di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/auth/register.js"></script>
</body>

</html>
