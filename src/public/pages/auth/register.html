<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="auth-page">
    <div class="auth-card card card--elevated">
      <h1 class="auth-card__title">Daftar Akun Baru</h1>
      <p class="auth-card__subtitle">Isi data diri Anda di bawah ini</p>

      <div id="alert-container"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Nama Lengkap</label>
          <input class="form-input" type="text" id="name" placeholder="Nama lengkap" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Nomor Telepon</label>
          <input class="form-input" type="tel" id="phone" placeholder="08123456789" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="username">Nama Pengguna</label>
          <input class="form-input" type="text" id="username" placeholder="Username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Kata Sandi</label>
          <input class="form-input" type="password" id="password" placeholder="Minimal 6 karakter" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Konfirmasi Kata Sandi</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="Ulangi kata sandi" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">Daftar Sekarang</button>
      </form>

      <div class="auth-card__footer">
        Sudah punya akun? <a href="/auth/login">Masuk di sini</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/auth/register.js"></script>
</body>
</html>
