<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Admin — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="auth-page">
    <div class="auth-card card card--elevated">
      <h1 class="auth-card__title">Portal Admin</h1>
      <p class="auth-card__subtitle">Masuk untuk mengelola sistem klinik</p>

      <div id="alert-container"></div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label class="form-label" for="username">Nama Pengguna</label>
          <input class="form-input" type="text" id="username" placeholder="Username admin" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Kata Sandi</label>
          <input class="form-input" type="password" id="password" placeholder="Kata sandi admin" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn--danger btn--lg" style="width:100%;">Masuk sebagai Admin</button>
      </form>
      <div class="auth-card__footer" style="margin-top: var(--space-lg); border-top: var(--rule-hair) solid var(--color-rule); padding-top: var(--space-sm);">
        Bukan Admin? <a href="/auth/login" style="font-weight: var(--weight-medium);">Masuk sebagai Pasien</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/auth/admin-login.js"></script>
</body>
</html>
