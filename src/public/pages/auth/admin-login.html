<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <main class="container-fluid p-0">
        <div class="row g-0" style="min-height: 100vh;">
            <!-- Left Side (Image/Branding) -->
            <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center bg-light-blue" style="position: relative; overflow: hidden;">
                <div style="z-index: 2; max-width: 80%; text-align: center;">
                    <img src="/images/hero.png" alt="Medical UI" class="img-fluid hero-image mb-4" style="max-height: 300px;">
                    <h2 class="fw-bold text-dark-blue mb-3">Portal Manajemen Sistem</h2>
                    <p class="text-muted lead">Kelola jadwal, antrean, dan data pasien dari satu pusat kendali yang terintegrasi.</p>
                </div>
            </div>

            <!-- Right Side (Form) -->
            <div class="col-lg-6 d-flex justify-content-center align-items-center">
                <div class="w-100" style="max-width: 450px; padding: 2rem;">
                    <div class="text-center mb-5">
                        <a href="/" class="text-decoration-none">
                            <h3 class="fw-bold text-primary mb-4"><i class="bi bi-hospital"></i> Sistem Booking Klinik</h3>
                        </a>
                        <h2 class="fw-bold text-danger">Portal Admin</h2>
                        <p class="text-muted">Masuk untuk mengelola sistem klinik</p>
                    </div>

                    <div id="alert-container"></div>
                    
                    <form id="adminLoginForm">
                        <div class="mb-4">
                            <label for="username" class="form-label text-dark-blue fw-bold">Nama Pengguna (Username)</label>
                            <input type="text" class="form-control form-control-lg" id="username" placeholder="Masukkan username admin" required>
                        </div>
                        <div class="mb-5">
                            <label for="password" class="form-label text-dark-blue fw-bold">Kata Sandi</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Masukkan kata sandi admin" required>
                        </div>
                        <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold shadow-sm">Masuk sebagai Admin</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/auth/admin-login.js"></script>
</body>

</html>
