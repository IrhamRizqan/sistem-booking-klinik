<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Antrean — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header">
        <h1 class="page-header__title">Kelola Antrean</h1>
        <p class="page-header__desc">Filter dan pantau antrean pasien hari ini.</p>
      </div>

      <div id="alert-container"></div>

      <!-- Filters -->
      <div class="card mb-lg" style="padding:var(--space-lg);">
        <form id="filterForm" class="flex flex-wrap gap-md items-center">
          <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0;">
            <label class="form-label" for="filterDate">Tanggal</label>
            <input class="form-input" type="date" id="filterDate">
          </div>
          <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0;">
            <label class="form-label" for="filterDoctor">Dokter</label>
            <select class="form-select" id="filterDoctor">
              <option value="">Semua Dokter</option>
            </select>
          </div>
          <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0;">
            <label class="form-label" for="filterSort">Urutan</label>
            <select class="form-select" id="filterSort">
              <option value="desc" selected>Terbaru (Latest)</option>
              <option value="asc">Terlama (Oldest)</option>
            </select>
          </div>
          <button type="submit" class="btn btn--primary" style="align-self:flex-end;">Terapkan</button>
        </form>
      </div>

      <!-- Queue Table -->
      <div class="card card--elevated">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>No. Antrean</th>
                <th>Kode Booking</th>
                <th>Pasien</th>
                <th>Dokter</th>
                <th>Jam</th>
                <th>Status</th>
                <th style="text-align:right;">Aksi</th>
              </tr>
            </thead>
            <tbody id="queueTableBody">
              <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--color-muted);">Memuat antrean...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/queues.js"></script>
</body>
</html>
