<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsip Klinik — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1 class="page-header__title">Arsip Klinik</h1>
          <p class="page-header__desc">Riwayat kunjungan dan data historis.</p>
        </div>
        <div class="flex gap-sm">
          <button class="btn btn--outline btn--sm" id="btnExportCsv">Export CSV</button>
          <button class="btn btn--danger btn--sm" id="btnExportPdf">Export PDF</button>
        </div>
      </div>

      <div id="alert-container"></div>

      <!-- Filters -->
      <div class="card mb-lg" style="padding:var(--space-lg);">
        <form id="filterForm" class="flex flex-wrap gap-md items-center">
          <div class="form-group" style="flex:1;min-width:160px;margin-bottom:0;">
            <label class="form-label" for="filterSearch">Cari</label>
            <input class="form-input" type="text" id="filterSearch" placeholder="Kode atau nama pasien">
          </div>
          <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0;">
            <label class="form-label" for="filterDate">Tanggal</label>
            <input class="form-input" type="date" id="filterDate">
          </div>
          <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0;">
            <label class="form-label" for="filterDoctor">Dokter</label>
            <select class="form-select" id="filterDoctor">
              <option value="">Semua Dokter</option>
            </select>
          </div>
          <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0;">
            <label class="form-label" for="filterStatus">Status</label>
            <select class="form-select" id="filterStatus">
              <option value="">Semua Status</option>
              <option value="Confirmed">Menunggu</option>
              <option value="Calling">Dipanggil</option>
              <option value="On Treatment">Diperiksa</option>
              <option value="Completed">Selesai</option>
              <option value="Skipped">Dilewati</option>
            </select>
          </div>
          <div class="flex gap-sm" style="align-self:flex-end;">
            <button type="button" class="btn btn--ghost" id="btnReset">Reset</button>
            <button type="submit" class="btn btn--primary">Filter</button>
          </div>
        </form>
      </div>

      <!-- Archive Table -->
      <div class="card card--elevated">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Kode</th>
                <th>Pasien</th>
                <th>Dokter</th>
                <th>Jam</th>
                <th>No. Antrean</th>
                <th style="text-align:right;">Status</th>
              </tr>
            </thead>
            <tbody id="archiveTableBody">
              <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--color-muted);">Memuat arsip...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <nav id="paginationNav" style="display:none;margin-top:var(--space-lg);text-align:center;">
        <ul id="paginationList" class="flex gap-xs justify-center" style="list-style:none;"></ul>
      </nav>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/archive.js"></script>
</body>
</html>
