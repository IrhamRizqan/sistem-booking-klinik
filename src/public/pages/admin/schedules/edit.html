<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Jadwal — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1 class="page-header__title">Edit Jadwal</h1>
          <p class="page-header__desc">Perbarui jadwal dokter.</p>
        </div>
        <a href="/admin/schedules" class="btn btn--ghost btn--sm">&larr; Kembali</a>
      </div>

      <div class="card card--elevated" style="max-width:520px;">
        <div style="padding:var(--space-2xl);">
          <div id="alert-container"></div>
          <form id="editForm">
            <div class="form-group">
              <label class="form-label" for="doctor_id">Dokter</label>
              <select class="form-select" id="doctor_id" required>
                <option value="">Memuat dokter...</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="day">Hari</label>
              <select class="form-select" id="day" required>
                <option value="">Pilih Hari</option>
                <option value="Monday">Senin</option>
                <option value="Tuesday">Selasa</option>
                <option value="Wednesday">Rabu</option>
                <option value="Thursday">Kamis</option>
                <option value="Friday">Jumat</option>
                <option value="Saturday">Sabtu</option>
                <option value="Sunday">Minggu</option>
              </select>
            </div>
            <div class="flex gap-md">
              <div class="form-group" style="flex:1;">
                <label class="form-label" for="start_time">Jam Mulai</label>
                <input class="form-input" type="time" id="start_time" required>
              </div>
              <div class="form-group" style="flex:1;">
                <label class="form-label" for="end_time">Jam Selesai</label>
                <input class="form-input" type="time" id="end_time" required>
                <p class="form-hint">Harus lebih besar dari jam mulai.</p>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="quota">Kuota per Slot</label>
              <input class="form-input" type="number" id="quota" min="1" required>
              <p class="form-hint">Minimal 1 pasien per slot.</p>
            </div>
            <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">Perbarui Jadwal</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/schedules/edit.js"></script>
</body>
</html>
