<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Jadwal — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1 class="page-header__title">Tambah Jadwal</h1>
          <p class="page-header__desc">Buat jadwal baru untuk dokter.</p>
        </div>
        <a href="/admin/schedules" class="btn btn--ghost btn--sm">&larr; Kembali ke Daftar</a>
      </div>

      <div class="card card--elevated" style="max-width:640px;">
        <div style="padding:var(--space-2xl);">
          <div id="alert-container"></div>

          <form id="createForm">
            <div class="form-group">
              <label class="form-label" for="doctor_id">Dokter</label>
              <select class="form-select" id="doctor_id" required>
                <option value="">Memuat dokter...</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Hari</label>
              <div class="flex flex-wrap gap-md" style="margin-top:var(--space-xs);">
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Monday" id="dayMon"> Senin
                </label>
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Tuesday" id="dayTue"> Selasa
                </label>
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Wednesday" id="dayWed"> Rabu
                </label>
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Thursday" id="dayThu"> Kamis
                </label>
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Friday" id="dayFri"> Jumat
                </label>
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Saturday" id="daySat"> Sabtu
                </label>
                <label style="display:flex;align-items:center;gap:var(--space-2xs);font-size:var(--text-sm);cursor:pointer;">
                  <input type="checkbox" class="day-checkbox" value="Sunday" id="daySun"> Minggu
                </label>
              </div>
            </div>

            <div class="flex gap-md">
              <div class="form-group" style="flex:1;">
                <label class="form-label" for="start_time">Jam Mulai</label>
                <input class="form-input" type="time" id="start_time" required>
              </div>
              <div class="form-group" style="flex:1;">
                <label class="form-label" for="end_time">Jam Selesai</label>
                <input class="form-input" type="time" id="end_time" required>
                <p class="form-hint">Harus lebih besar dari jam mulai.</p>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="quota">Kuota per Slot</label>
              <input class="form-input" type="number" id="quota" min="1" value="1" required>
              <p class="form-hint">Minimal 1 pasien per slot yang dihasilkan.</p>
            </div>

            <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">Simpan Jadwal</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/schedules/create.js"></script>
</body>
</html>
