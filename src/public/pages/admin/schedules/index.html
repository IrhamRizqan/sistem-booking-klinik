<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Jadwal — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1 class="page-header__title">Kelola Jadwal</h1>
          <p class="page-header__desc">Daftar jadwal dokter yang tersedia.</p>
        </div>
        <a href="/admin/schedules/create" class="btn btn--primary btn--sm">+ Tambah Jadwal</a>
      </div>

      <div id="alert-container"></div>

      <!-- Filters -->
      <div class="card mb-lg" style="padding:var(--space-lg);">
        <form id="filterForm" class="flex flex-wrap gap-md items-center">
          <div class="form-group" style="flex:1;min-width:240px;margin-bottom:0;">
            <label class="form-label" for="searchInput">Cari Nama Dokter</label>
            <input class="form-input" type="text" id="searchInput" placeholder="Nama dokter...">
          </div>
          <button type="submit" class="btn btn--outline" style="align-self:flex-end;">Filter</button>
        </form>
      </div>

      <!-- Table -->
      <div class="card card--elevated">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Dokter</th>
                <th>Hari</th>
                <th>Jam & Slot</th>
                <th>Kuota/Slot</th>
                <th>Status</th>
                <th style="text-align:right;">Aksi</th>
              </tr>
            </thead>
            <tbody id="schedulesTableBody"></tbody>
          </table>
        </div>
      </div>

      <nav id="paginationNav" style="display:none;margin-top:var(--space-lg);text-align:center;">
        <ul id="paginationList" class="flex gap-xs justify-center" style="list-style:none;"></ul>
      </nav>
    </div>
  </main>

  <!-- Delete Confirmation Dialog -->
  <dialog id="deleteModal" style="border:none;border-radius:var(--radius-md);padding:0;max-width:400px;width:90%;">
    <div style="padding:var(--space-xl);">
      <h3 style="margin-bottom:var(--space-md);">Hapus Jadwal?</h3>
      <p class="text-muted" style="margin-bottom:var(--space-lg);">Apakah Anda yakin ingin menghapus jadwal untuk <strong id="deleteDoctorName"></strong>? Tindakan ini tidak dapat dibatalkan.</p>
      <div class="flex gap-sm" style="justify-content:flex-end;">
        <button class="btn btn--ghost btn--sm" id="cancelDeleteBtn">Batal</button>
        <button class="btn btn--danger btn--sm" id="confirmDeleteBtn">Hapus</button>
      </div>
    </div>
  </dialog>

  <!-- Slots View Dialog -->
  <dialog id="slotsModal" style="border:none;border-radius:var(--radius-md);padding:0;max-width:360px;width:90%;">
    <div style="padding:var(--space-xl);">
      <h3 style="margin-bottom:var(--space-md);">Slot yang Dihasilkan</h3>
      <div id="slotsListContainer" style="margin-bottom:var(--space-lg);"></div>
      <button class="btn btn--ghost" id="closeSlotsBtn" style="width:100%;">Tutup</button>
    </div>
  </dialog>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/schedules/index.js"></script>
</body>
</html>
