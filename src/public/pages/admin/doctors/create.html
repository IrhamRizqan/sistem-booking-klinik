<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Dokter — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1 class="page-header__title">Tambah Dokter</h1>
          <p class="page-header__desc">Daftarkan dokter baru ke sistem.</p>
        </div>
        <a href="/admin/doctors" class="btn btn--ghost btn--sm">&larr; Kembali</a>
      </div>

      <div class="card card--elevated" style="max-width:520px;">
        <div style="padding:var(--space-2xl);">
          <div id="alert-container"></div>
          <form id="createForm">
            <div class="form-group">
              <label class="form-label" for="name">Nama Lengkap</label>
              <input class="form-input" type="text" id="name" placeholder="Dr. Nama Dokter" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="specialization">Spesialisasi</label>
              <input class="form-input" type="text" id="specialization" placeholder="contoh: Kardiologi" required>
              <p class="form-hint">Masukkan bidang keahlian (contoh: Dokter Umum, Gigi).</p>
            </div>
            <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">Simpan Dokter</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/doctors/create.js"></script>
</body>
</html>
