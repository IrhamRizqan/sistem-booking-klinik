<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <div class="row mb-4 align-items-center mt-4">
            <div class="col-md-6">
                <h2 class="fw-bold text-primary mb-0">Manage Doctors</h2>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <a href="/admin/doctors/create" class="btn btn-primary fw-bold">
                    <i class="bi bi-plus-lg me-1"></i> Add New Doctor
                </a>
            </div>
        </div>

        <div id="alert-container"></div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <form id="filterForm" class="row g-3 mb-4">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search text-muted"></i>
                            </span>
                            <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Search doctor by name...">
                        </div>
                    </div>
                    <div class="col-md-5">
                        <select id="specializationSelect" class="form-select">
                            <option value="">All Specializations</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-outline-primary fw-bold">Filter</button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light text-muted">
                            <tr>
                                <th class="fw-semibold">Name</th>
                                <th class="fw-semibold">Specialization</th>
                                <th class="fw-semibold text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="doctorsTableBody">
                            <!-- Populated via API -->
                        </tbody>
                    </table>
                </div>

                <nav aria-label="Doctor pagination" class="mt-4" id="paginationNav" style="display: none;">
                    <ul class="pagination justify-content-center mb-0" id="paginationList">
                    </ul>
                </nav>
            </div>
        </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header border-bottom-0 pb-0">
            <h5 class="modal-title fw-bold text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i> Confirm Deletion</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body py-4">
            Are you sure you want to delete <strong id="deleteDoctorName"></strong>? This action cannot be undone.
          </div>
          <div class="modal-footer border-top-0 pt-0">
            <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">Cancel</button>
            <button type="button" id="confirmDeleteBtn" class="btn btn-danger fw-bold">Yes, Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/admin/doctors/index.js"></script>
</body>
</html>
