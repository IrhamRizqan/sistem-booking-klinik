<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="container section-padding">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Admin Dashboard</h2>
            <a href="/admin/queues" class="btn btn-outline-primary">Manage Queues</a>
        </div>

        <div id="alert-container"></div>
        
        <div id="dashboardContent" style="display: none;">
            <!-- Statistics Cards -->
            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">Total Doctors</h6>
                            <h2 class="display-5 fw-bold text-primary mb-0" id="statDoctors">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">Today's Bookings</h6>
                            <h2 class="display-5 fw-bold text-dark mb-0" id="statBookings">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">Waiting</h6>
                            <h2 class="display-5 fw-bold text-secondary mb-0" id="statWaiting">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">Currently Calling</h6>
                            <h2 class="display-5 fw-bold text-warning mb-0" id="statCalling">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">On Treatment</h6>
                            <h2 class="display-5 fw-bold text-primary mb-0" id="statTreatment">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">Completed Today</h6>
                            <h2 class="display-5 fw-bold text-success mb-0" id="statCompleted">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm border-0 h-100 bg-light">
                        <div class="card-body text-center">
                            <h6 class="text-muted text-uppercase mb-2">Skipped Today</h6>
                            <h2 class="display-5 fw-bold text-danger mb-0" id="statSkipped">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Today's Queue Table -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h5 class="mb-0">Today's Queue Overview</h5>
                </div>
                <div class="card-body p-0 mt-3">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" class="px-4">Queue #</th>
                                    <th scope="col">Patient Name</th>
                                    <th scope="col">Doctor</th>
                                    <th scope="col">Time Slot</th>
                                    <th scope="col" class="text-end px-4">Status</th>
                                </tr>
                            </thead>
                            <tbody id="todayQueueBody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading dashboard data...</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/admin/dashboard.js"></script>
</body>
</html>
