<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="admin-sidebar__link admin-sidebar__link--active" href="/admin/dashboard">Dashboard</a>
      <a class="admin-sidebar__link" href="/admin/queues">Antrean</a>
      <a class="admin-sidebar__link" href="/admin/schedules">Jadwal</a>
      <a class="admin-sidebar__link" href="/admin/doctors">Dokter</a>
      <a class="admin-sidebar__link" href="/admin/archive">Arsip</a>
    </aside>

    <div class="admin-main">
      <div class="page-header flex justify-between items-center">
        <div>
          <h1 class="page-header__title">Dashboard Admin</h1>
          <p class="page-header__desc">Ringkasan aktivitas klinik hari ini.</p>
        </div>
        <a href="/admin/queues" class="btn btn--outline btn--sm">Kelola Antrean</a>
      </div>

      <div id="alert-container"></div>

      <!-- Stats -->
      <div id="dashboardContent" style="display:none;">
        <div class="features" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));">
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);color:var(--color-accent);font-variant-numeric:tabular-nums;" id="statDoctors">0</div>
            <div class="feature__text">Dokter</div>
          </div>
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);font-variant-numeric:tabular-nums;" id="statBookings">0</div>
            <div class="feature__text">Booking Hari Ini</div>
          </div>
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);font-variant-numeric:tabular-nums;" id="statWaiting">0</div>
            <div class="feature__text">Menunggu</div>
          </div>
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);color:var(--color-warning);font-variant-numeric:tabular-nums;" id="statCalling">0</div>
            <div class="feature__text">Dipanggil</div>
          </div>
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);color:var(--color-accent);font-variant-numeric:tabular-nums;" id="statTreatment">0</div>
            <div class="feature__text">Diperiksa</div>
          </div>
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);color:var(--color-success);font-variant-numeric:tabular-nums;" id="statCompleted">0</div>
            <div class="feature__text">Selesai</div>
          </div>
          <div class="feature">
            <div class="feature__title" style="font-size:var(--text-3xl);color:var(--color-danger);font-variant-numeric:tabular-nums;" id="statSkipped">0</div>
            <div class="feature__text">Dilewati</div>
          </div>
        </div>

        <!-- Queue Table -->
        <div class="card card--elevated" style="margin-top:var(--space-2xl);">
          <h3 style="padding:var(--space-lg);padding-bottom:0;">Ringkasan Antrean Hari Ini</h3>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>No. Antrean</th>
                  <th>Pasien</th>
                  <th>Dokter</th>
                  <th>Jam</th>
                  <th style="text-align:right;">Status</th>
                </tr>
              </thead>
              <tbody id="todayQueueBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Loading -->
      <div id="loadingState" class="text-center" style="padding:var(--space-3xl);color:var(--color-muted);">
        <p>Memuat data dashboard...</p>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/admin/dashboard.js"></script>
</body>
</html>
