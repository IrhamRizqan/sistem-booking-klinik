<footer class="footer"
  style="padding: var(--space-md) 0; margin-top: var(--space-xl); border-top: var(--rule-hair) solid var(--color-rule); background: var(--color-paper);">
  <div class="container">
    <div class="footer__inner"
      style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-sm);">
      <div class="footer__left"
        style="display: flex; align-items: center; gap: var(--space-sm); font-size: var(--text-xs);">
        <span class="footer__brand"
          style="font-weight: var(--weight-semi); color: var(--color-ink); font-size: var(--text-xs);">Klinik
          Bunda</span>
        <span class="footer__copy" style="color: var(--color-faint); font-family: var(--font-mono);">&copy; 2026</span>
      </div>
      <ul class="footer__links" style="display: flex; gap: var(--space-md); list-style: none; margin: 0; padding: 0;">
        <li class="role-guest"><a class="footer__link" href="/auth/login"
            style="font-size: var(--text-xs); color: var(--color-muted);">Masuk</a></li>
        <li class="role-guest"><a class="footer__link" href="/auth/register"
            style="font-size: var(--text-xs); color: var(--color-muted);">Daftar</a></li>
      </ul>
    </div>
  </div>
</footer>
