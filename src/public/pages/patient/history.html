<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History - Sistem Booking Klinik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="container section-padding">
        <h2 class="mb-4">Booking History</h2>
        <div id="alert-container"></div>
        
        <!-- Filters -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form id="filterForm" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="filterDate" class="form-label">Visit Date</label>
                        <input type="date" class="form-control" id="filterDate">
                    </div>
                    <div class="col-md-4">
                        <label for="filterStatus" class="form-label">Status</label>
                        <select class="form-select" id="filterStatus">
                            <option value="">All Statuses</option>
                            <option value="Confirmed">Menunggu</option>
                            <option value="Calling">Dipanggil</option>
                            <option value="On Treatment">Sedang Diperiksa</option>
                            <option value="Completed">Selesai</option>
                            <option value="Skipped">Dilewati</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Apply Filter</button>
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-outline-secondary w-100" id="btnReset">Reset</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- History Table -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="px-4">Visit Date</th>
                                <th scope="col">Booking Code</th>
                                <th scope="col">Doctor</th>
                                <th scope="col">Specialization</th>
                                <th scope="col">Time Slot</th>
                                <th scope="col">Queue #</th>
                                <th scope="col" class="text-end px-4">Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <tr>
                                <td colspan="7" class="text-center py-4">Loading history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" id="paginationNav" style="display: none;">
            <ul class="pagination justify-content-center" id="paginationList">
                <!-- Dynamic pages -->
            </ul>
        </nav>
        
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/patient/history.js"></script>
</body>
</html>
