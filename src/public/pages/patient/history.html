<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Booking — Sistem Booking Klinik</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <div class="page-header">
      <h1 class="page-header__title">Riwayat Booking</h1>
      <p class="page-header__desc">Lihat semua kunjungan Anda sebelumnya.</p>
    </div>

    <div id="alert-container"></div>

    <!-- Filters -->
    <div class="card mb-lg" style="padding:var(--space-lg);">
      <form id="filterForm" class="flex flex-wrap gap-md items-center">
        <div class="form-group" style="flex:1;min-width:160px;margin-bottom:0;">
          <label class="form-label" for="filterDate">Tanggal</label>
          <input class="form-input" type="date" id="filterDate">
        </div>
        <div class="form-group" style="flex:1;min-width:160px;margin-bottom:0;">
          <label class="form-label" for="filterStatus">Status</label>
          <select class="form-select" id="filterStatus">
            <option value="">Semua Status</option>
            <option value="Confirmed">Menunggu</option>
            <option value="Calling">Dipanggil</option>
            <option value="On Treatment">Diperiksa</option>
            <option value="Completed">Selesai</option>
            <option value="Skipped">Dilewati</option>
          </select>
        </div>
        <button type="submit" class="btn btn--primary" style="align-self:flex-end;">Filter</button>
        <button type="button" class="btn btn--ghost" id="btnReset" style="align-self:flex-end;">Reset</button>
      </form>
    </div>

    <!-- History Table -->
    <div class="card card--elevated">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Kode</th>
              <th>Dokter</th>
              <th>Spesialisasi</th>
              <th>Jam</th>
              <th>No. Antrean</th>
              <th style="text-align:right;">Status</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
            <tr><td colspan="7" style="text-align:center;padding:var(--space-xl);color:var(--color-muted);">Memuat riwayat...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <nav id="paginationNav" style="display:none;margin-top:var(--space-lg);text-align:center;">
      <ul id="paginationList" class="flex gap-xs justify-center" style="list-style:none;"></ul>
    </nav>
  </main>

  <div id="footer-placeholder"></div>
  <script src="/js/layout.js"></script>
  <script src="/js/patient/history.js"></script>
</body>
</html>
